apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.limits.appName }}-service
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.limits.appName }}
spec:
  selector:
    app: {{ .Values.global.product }}
    tier: {{ .Values.limits.appName }}
  ports:
  - protocol: TCP
    port: {{ .Values.limits.port }}
    targetPort: {{ .Values.limits.port }}
