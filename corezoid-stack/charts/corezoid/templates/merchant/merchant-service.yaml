apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.merchant.appName }}-service
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.merchant.appName }}
spec:
  selector:
    app: {{ .Values.global.product }}
    tier: {{ .Values.merchant.appName }}
  ports:
  - protocol: TCP
    name: main
    port: {{ .Values.merchant.port | default 8080 }}
    targetPort: {{ .Values.merchant.targetPort | default 8080 }}
  - protocol: TCP
    name: managment
    port: 7980
    targetPort: 7980
