{{- if .Values.capi.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.capi.secret.name}}
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.capi.appName | default "capi" }}
type: Opaque
data:
  {{- range $key, $value := .Values.capi.secret.data }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end}}
