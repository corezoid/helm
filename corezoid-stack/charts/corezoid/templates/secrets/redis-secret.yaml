{{- if .Values.redis.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.redis.secret.name}}
  labels:
    app: {{ .Values.global.product }}
    tier: "redis"
type: Opaque
stringData:
  {{- range $key, $value := .Values.redis.secret.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
