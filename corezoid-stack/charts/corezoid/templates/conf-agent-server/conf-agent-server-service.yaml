apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.confAgentServer.appName }}-service
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appName }}
spec:
  selector:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appName }}
  ports:
  - protocol: TCP
    port: {{ .Values.confAgentServer.port | default 8585 }}
    targetPort: {{ .Values.confAgentServer.targetPort | default 8585 }}
