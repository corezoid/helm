apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.store_dumps.appName }}-service
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.store_dumps.appName }}
spec:
  selector:
    app: {{ .Values.global.product }}
    tier: {{ .Values.store_dumps.appName }}-ui
  ports:
    - protocol: TCP
      name: nginx
      port: 80
      targetPort: 80
    - protocol: TCP
      name: node
      port: 3000
      targetPort: 3000
