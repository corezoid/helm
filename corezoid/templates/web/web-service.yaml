apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.webadm.name }}-service
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "corezoid.labels.standard" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "corezoid.webadm" . }}
    app.kubernetes.io/component: {{ .Values.webadm.name }}
    app: {{ .Values.global.product }}
spec:
  selector:
    app.kubernetes.io/component: {{ .Values.webadm.name }}
    app.kubernetes.io/name: {{ include "corezoid.webadm" . }}
    app: {{ .Values.global.product }}
  ports:
    - name: web
      protocol: TCP
      port: {{ .Values.webadm.service.port | default 80 }}
      targetPort: web
  type: NodePort
