{{- if .Values.postgres.secret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.secret.name}}-root
  labels:
    app: {{ .Values.global.product }}
    tier: "postgres"
type: Opaque
data:
  dbsuperuser: {{ .Values.postgres.secret.dbsuperuser | b64enc | quote }}
  dbsuperuserpwd: {{ .Values.postgres.secret.dbsuperuserpwd | b64enc | quote }}
{{- end}}
