{{- if .Values.externalElasticsearch.host }}
---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-secret
  labels:
    app: {{ .Values.global.product }}
    tier: "elasticsearch"
  annotations:
    {{- include "corezoid.provisoner.configmap" . | nindent 4 }}
type: Opaque
data:
  ELASTICSEARCH_HOST: {{ .Values.externalElasticsearch.host | b64enc | quote }}
  ELASTICSEARCH_PORT: {{ .Values.externalElasticsearch.port | b64enc | quote }}
{{- end }}
