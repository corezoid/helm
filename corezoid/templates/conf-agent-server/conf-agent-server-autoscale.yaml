apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.confAgentServer.appNameappName }}-autoscale
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appNameappName }}
spec:
  minReplicas: {{ .Values.confAgentServer.minReplicas }}
  maxReplicas: {{ .Values.confAgentServer.maxReplicas }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.confAgentServer.appNameappName }}-deployment
  targetCPUUtilizationPercentage: {{ .Values.capi.targetCPUUtilizationPercentage | default "65" }}
