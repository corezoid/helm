apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.confAgentServer.appName }}-autoscale
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appName }}
spec:
  minReplicas: {{ .Values.confAgentServer.minReplicas | default 1 }}
  maxReplicas: {{ .Values.confAgentServer.maxReplicas | default 1 }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.confAgentServer.appName }}-deployment
  targetCPUUtilizationPercentage: {{ .Values.capi.targetCPUUtilizationPercentage | default 65 }}
