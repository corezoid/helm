apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.confAgentServer.appNameappName }}-service
  labels:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appNameappName }}
spec:
  selector:
    app: {{ .Values.global.product }}
    tier: {{ .Values.confAgentServer.appNameappName }}
  ports:
  - protocol: TCP
    port: {{ .Values.confAgentServer.port | default "8585" | quote }}
    targetPort: {{ .Values.confAgentServer.targetPort | default "8585" | quote }}
