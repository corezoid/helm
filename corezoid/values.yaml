  port: "9100"
  scrape: "true"
## @param custom schedulerName https://kubernetes.io/docs/tasks/extend-kubernetes/configure-multiple-schedulers/
##
schedulerName: ""
## @section to define provisoner argocd | helm default: helm
provisoner: ""

