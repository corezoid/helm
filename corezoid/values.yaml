## @section CAPI Parameters

## CAPI
##
capi:
  name: capi
  ## @param image.registry CAPI image registry
  ## @param image.repository CAPI image repository
  ## @param image.tag CAPI image tag (immutable tags are recommended)
  ## @param image.pullPolicy CAPI image pull policy
  ## @param image.pullSecrets CAPI image pull secrets
  ##
  image:
    registry: docker-hub.middleware.biz
    repository: public/conveyor_api
    tag: "7.6.1.1"
    pullPolicy: IfNotPresent
    pullSecrets: []
  updateStrategy:
    type: RollingUpdate
  ## @param capi.terminationGracePeriodSeconds duration in seconds the CAPI pod needs to terminate gracefully. Defaults to 300 seconds.
  ##
  terminationGracePeriodSeconds: 10
  ## @param capi.replicaCount Number of CAPI replicas to deploy
  ##
  replicaCount: 2
  ## capi resource requests and limits
  ## ref: http://kubernetes.io/docs/user-guide/compute-resources/
  ## @param capi.resources.limits The resources limits for the CAPI containers
  ## @param capi.resources.requests The requested resources for the CAPI containers
  ##
  resources:
    limits:
      cpu: 1200m
      memory: 1500Mi
    requests:
      cpu: 50m
      memory: 50Mi
  ## @param capi.customLivenessProbe Custom livenessProbe that overrides the default one
  ##
  customLivenessProbe: {}
  ## @param capi.customReadinessProbe Custom readinessProbe that overrides the default one
  ##
  customReadinessProbe: {}
  ## @param capi.existingConfigmap The name of an existing ConfigMap with your custom configuration for CAPI
  ##
  existingConfigmap:
  ## @param capi.command Override default container command (useful when using custom images)
  ##
  command: []
  ## @param capi.args Override default container args (useful when using custom images)
  ##
  args: []
  ## https://kubernetes.io/docs/concepts/services-networking/add-entries-to-pod-etc-hosts-with-host-aliases/
  ##
  hostAliases: []
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
  ##
  podLabels: {}
  ## ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  ##
  podAnnotations: {}
  ## @param capi.podAffinityPreset Pod affinity preset. Ignored if `capi.affinity` is set. Allowed values: `soft` or `hard`
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAffinityPreset: ""
  ## @param capi.podAntiAffinityPreset Pod anti-affinity preset. Ignored if `capi.affinity` is set. Allowed values: `soft` or `hard`
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity
  ##
  podAntiAffinityPreset: soft
  ## Node capi.affinity preset
  ## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#node-affinity
  ##
  nodeAffinityPreset:
    ## @param capi.nodeAffinityPreset.type Node affinity preset type. Ignored if `capi.affinity` is set. Allowed values: `soft` or `hard`
    ##
    type: ""
    ## @param capi.nodeAffinityPreset.key Node label key to match. Ignored if `capi.affinity` is set
    ##
    key: ""
    ## @param capi.nodeAffinityPreset.values Node label values to match. Ignored if `capi.affinity` is set
    ## E.g.
    ## values:
    ##   - e2e-az1
    ##   - e2e-az2
    ##
    values: []
  ## @param capi.affinity Affinity for CAPI pods assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
  ## NOTE: `capi.podAffinityPreset`, `capi.podAntiAffinityPreset`, and `capi.nodeAffinityPreset` will be ignored when it's set
  ##
  affinity: {}
  ## @param capi.nodeSelector Node labels for CAPI pods assignment
  ## ref: https://kubernetes.io/docs/user-guide/node-selection/
  ##
  nodeSelector: {}
  ## @param capi.tolerations Tolerations for CAPI pods assignment
  ## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
  ##
  tolerations: []
  ## @param capi.updateStrategy.type CAPI statefulset strategy type
  ## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
  ##
  ## @param capi.priorityClassName CAPI pods' priorityClassName
  ##
  priorityClassName: ""
  ## @param capi.lifecycleHooks for the CAPI container(s) to automate configuration before or after startup
  ##
  lifecycleHooks: {}
  ## @param capi.extraEnvVars Array with extra environment variables to add to CAPI nodes
  ## e.g:
  ## extraEnvVars:
  ##   - name: FOO
  ##     value: "bar"
  ##
  extraEnvVars: []
  ## @param capi.extraEnvVarsCM Name of existing ConfigMap containing extra env vars for CAPI nodes
  ##
  extraEnvVarsCM:
  ## @param capi.extraEnvVarsSecret Name of existing Secret containing extra env vars for CAPI nodes
  ##
  extraEnvVarsSecret:
  ## @param capi.extraVolumes Optionally specify extra list of additional volumes for the CAPI pod(s)
  ##
  extraVolumes: []
  ## @param capi.extraVolumeMounts Optionally specify extra list of additional volumeMounts for the CAPI container(s)
  ##
  extraVolumeMounts: []
  ## @param capi.sidecars Add additional sidecar containers to the CAPI pod(s)
  ## e.g:
  ## sidecars:
  ##   - name: your-image-name
  ##     image: your-image
  ##     imagePullPolicy: Always
  ##     ports:
  ##       - name: portname
  ##         containerPort: 1234
  ##
  sidecars: {}
  ## @param capi.initContainers Add additional init containers to the CAPI pod(s)
  ## ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
  ## e.g:
  ## initContainers:
  ##  - name: your-image-name
  ##    image: your-image
  ##    imagePullPolicy: Always
  ##    command: ['sh', '-c', 'echo "hello world"']
  ##
  initContainers: {}
  ##
  ##
  autoscaling:
    enabled: truecontainerPort
    minReplicas: 2
    maxReplicas: 4
    targetCPU: 65
    targetMemory: 1000Mi
    requests:
  service:
    ## @param capi.service.capiPort CAPI service port number. Default: 80
    ##
    capiPort: 9080
    ## @param capi.service.confAgentPort confAgentPort service port number. Default: 8585
    ##
    confAgentPort: 8585
  ## CAPI aplication parameters
  ##
  schedulers: 1
  capi_front_captcha_key: "kfvdsm;v"
  capi_backend_captcha_key: "ldsnvlsdn"
  registration_restriction:
    enable: false
    allowed_domains:
      - "gmail.com"
      - "yahoo.com"
  ## Сaptcha when login in UI enable/disable
  capi_front_captcha_disabled: true
  max_task_size_for_process_conv: 264000
  max_task_size_for_st_diagramm_conv: 264000
  ## max req/sec of create|modify|delete for conv|folder|dashboard in 1 sec
  max_reqs_limit: 50000
  ## merchant_api settings
  merchant_api:
    skip_otp: true
  ## cookie expire time in sec (default 900)
  cookie_expr_time: 7200
  ## Setting for configure frontend
  front_setting:
    ## documentation (navigate by clicking on DOCS link)
    doc_host: "doc.corezoid.com"
    doc_index: "/"
    ui:
      ## enabled Market button
      market: false
      ## button Create -> Bot platform
      bot_platform: false
      ## billing button display
      billing: false
      ## display of the git_call button
      git_call: false
      ## set default company name
      default_company: "My Corezoid"
      ## Tab name
      tab_name: "Corezoid"
      ## disable or enable logo on main page
      disabled_auth_logo: false
      ## colors
      color_main: "#0791e5"
      color_logo: "#0791e5"
      color_logo_hover: "#056cab"
  ldap_server: "ldap.middleware.loc"
  ldap_port: "389"
  ldap_base: "ou=people,o=middleware"
  ldap_filter: "uid"
  ## then this param is true, bind_user_name, bind_user_pass should be filled. if it's false it is not necessary
  ldap_first_bind_user: true
  ldap_bind_user_name: "uid=ldap,ou=people,o=middleware"
  ldap_bind_user_pass: ""
  ldap_user_nick_entry: "cn"
  ldap_tls: false
  logic_settings:
   ## max allowed threads for api logic
    api_max_thread: 50000
    sender_max_threads: 25
    timer_default: 5
  ## enigma private_key_id
  enigma_pk_id: ""

